<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>愤怒的小鸟</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #4fc3f7);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }
        h1 { font-size: 24px; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        /* 关卡选择界面 */
        .level-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
        }
        .level-card {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 3px solid #0f3460;
            transition: all 0.2s;
        }
        .level-card:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .level-num {
            font-size: 36px;
            font-weight: bold;
            color: #e94560;
        }
        .level-name {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }
        .level-stars {
            font-size: 20px;
            margin-top: 8px;
        }
        
        /* 游戏界面 */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .controls-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 8px;
        }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 20px; font-weight: bold; }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8BC34A 70%, #8BC34A 100%);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #1565c0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .game-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        .game-message.visible { opacity: 1; pointer-events: auto; }
        .game-message p { font-size: 28px; margin-bottom: 10px; }
        .game-message .stars { font-size: 32px; margin-bottom: 15px; }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #ff6b6b; }
        .btn-secondary { background: #0f3460; }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
        @media (max-width: 600px) {
            .game-container { height: 350px; }
            h1 { font-size: 18px; }
            .stat-value { font-size: 16px; }
            .level-grid { gap: 10px; }
            .level-card { padding: 15px; }
            .level-num { font-size: 28px; }
        }
    </style>
</head>
<body>
    <h1>💥 愤怒的小鸟</h1>
    
    <!-- 关卡选择界面 -->
    <div class="level-select" id="levelSelect">
        <p style="margin-bottom:20px;color:#aaa;">选择关卡</p>
        <div class="level-grid" id="levelGrid"></div>
        <button class="btn btn-secondary" style="margin-top:20px" onclick="location.href='index.html'">返回</button>
    </div>
    
    <!-- 游戏界面 -->
    <div class="game-screen" id="gameScreen">
        <div class="controls-row">
            <div class="stat-box">
                <div class="stat-label">关卡</div>
                <div class="stat-value" id="levelNum">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">小鸟</div>
                <div class="stat-value" id="birds">3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <div class="game-message" id="message">
                <p id="msgTitle">胜利!</p>
                <div class="stars" id="starsDisplay">⭐⭐⭐</div>
                <button class="btn" id="nextBtn" onclick="nextLevel()">下一关</button>
                <button class="btn btn-secondary" onclick="showLevelSelect()">关卡选择</button>
            </div>
        </div>
        
        <div class="instructions">拖拽弹弓发射小鸟，消灭所有猪！</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let birds, pigs, blocks, score, gameState;
        let currentBird, currentLevel, dragging;
        let slingshot;
        
        const GRAVITY = 0.3;
        const FRICTION = 0.99;
        const GROUND_Y_RATIO = 0.85;
        
        // 关卡数据
        const LEVELS = [
            {
                name: "新手入门",
                pigs: 1,
                blocks: [],
                birds: 2,
                pigPos: [{x: 0.75}]
            },
            {
                name: "简单练习",
                pigs: 2,
                blocks: [{x: 0.6, y: 30, w: 15, h: 60}],
                birds: 3,
                pigPos: [{x: 0.7}, {x: 0.8}]
            },
            {
                name: "木墙阻挡",
                pigs: 2,
                blocks: [
                    {x: 0.55, y: 30, w: 15, h: 60},
                    {x: 0.85, y: 30, w: 15, h: 60}
                ],
                birds: 3,
                pigPos: [{x: 0.65}, {x: 0.75}]
            },
            {
                name: "双层结构",
                pigs: 3,
                blocks: [
                    {x: 0.6, y: 30, w: 15, h: 60},
                    {x: 0.85, y: 30, w: 15, h: 60},
                    {x: 0.7, y: 75, w: 80, h: 12}
                ],
                birds: 3,
                pigPos: [{x: 0.65, low: true}, {x: 0.75, low: true}, {x: 0.7, low: false}]
            },
            {
                name: "堡垒挑战",
                pigs: 3,
                blocks: [
                    {x: 0.5, y: 30, w: 15, h: 90},
                    {x: 0.9, y: 30, w: 15, h: 90},
                    {x: 0.6, y: 50, w: 60, h: 12},
                    {x: 0.8, y: 50, w: 60, h: 12},
                    {x: 0.7, y: 100, w: 100, h: 12}
                ],
                birds: 4,
                pigPos: [{x: 0.65}, {x: 0.75}, {x: 0.7, low: false}]
            },
            {
                name: "终极挑战",
                pigs: 4,
                blocks: [
                    {x: 0.45, y: 30, w: 20, h: 120},
                    {x: 0.95, y: 30, w: 20, h: 120},
                    {x: 0.55, y: 60, w: 80, h: 15},
                    {x: 0.85, y: 60, w: 80, h: 15},
                    {x: 0.65, y: 120, w: 120, h: 15}
                ],
                birds: 5,
                pigPos: [{x: 0.6}, {x: 0.7}, {x: 0.8}, {x: 0.7, low: false}]
            }
        ];
        
        // 加载关卡进度
        let levelProgress = JSON.parse(localStorage.getItem('angryBirdsProgress') || '{"unlocked":1,"stars":{}}');
        
        function showLevelSelect() {
            document.getElementById('levelSelect').style.display = 'flex';
            document.getElementById('gameScreen').style.display = 'none';
            renderLevelGrid();
        }
        
        function renderLevelGrid() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < LEVELS.length; i++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                
                const unlocked = i + 1 <= levelProgress.unlocked;
                if (!unlocked) card.classList.add('locked');
                
                const stars = levelProgress.stars[i+1] || 0;
                const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
                
                card.innerHTML = `
                    <div class="level-num">${i + 1}</div>
                    <div class="level-name">${LEVELS[i].name}</div>
                    <div class="level-stars">${starStr}</div>
                `;
                
                if (unlocked) {
                    card.onclick = () => startLevel(i + 1);
                }
                
                grid.appendChild(card);
            }
        }
        
        function startLevel(levelNum) {
            currentLevel = levelNum;
            const level = LEVELS[levelNum - 1];
            
            document.getElementById('levelSelect').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('levelNum').textContent = levelNum;
            
            resize();
            score = 0;
            gameState = 'playing';
            
            // 弹弓位置
            slingshot = {
                x: width * 0.12,
                y: height * GROUND_Y_RATIO - 60,
                radius: 50
            };
            
            // 初始化小鸟
            birds = [];
            for (let i = 0; i < level.birds; i++) {
                birds.push({
                    x: slingshot.x,
                    y: slingshot.y,
                    vx: 0,
                    vy: 0,
                    radius: 15,
                    launched: false,
                    active: i === 0,
                    color: ['#e94560', '#ffeb3b', '#2196f3', '#4caf50', '#ff9800'][i]
                });
            }
            currentBird = birds[0];
            
            // 初始化猪
            pigs = [];
            for (const pos of level.pigPos) {
                const baseY = pos.low === false ? height * GROUND_Y_RATIO - 100 : height * GROUND_Y_RATIO - 20;
                pigs.push({
                    x: width * pos.x,
                    y: baseY,
                    radius: 18,
                    alive: true
                });
            }
            
            // 初始化障碍物
            blocks = [];
            for (const b of level.blocks) {
                blocks.push({
                    x: width * b.x,
                    y: height * GROUND_Y_RATIO - b.y,
                    width: b.w,
                    height: b.h,
                    type: 'wood',
                    health: 2
                });
            }
            
            dragging = false;
            
            updateStats();
            document.getElementById('message').classList.remove('visible');
            
            gameLoop();
        }
        
        function resize() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function updateStats() {
            document.getElementById('birds').textContent = birds.filter(b => !b.launched).length;
            document.getElementById('score').textContent = score;
        }
        
        function gameLoop() {
            if (gameState !== 'playing') return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function update() {
            for (const bird of birds) {
                if (bird.launched && bird.active) {
                    bird.vy += GRAVITY;
                    bird.vx *= FRICTION;
                    bird.vy *= FRICTION;
                    bird.x += bird.vx;
                    bird.y += bird.vy;
                    
                    if (bird.y + bird.radius > height * GROUND_Y_RATIO) {
                        bird.y = height * GROUND_Y_RATIO - bird.radius;
                        bird.vy *= -0.5;
                        bird.vx *= 0.8;
                        
                        if (Math.abs(bird.vy) < 1 && Math.abs(bird.vx) < 1) {
                            bird.active = false;
                            nextBird();
                        }
                    }
                    
                    if (bird.x > width + 50 || bird.x < -50) {
                        bird.active = false;
                        nextBird();
                    }
                    
                    checkBirdCollisions(bird);
                }
            }
            
            checkGameEnd();
        }
        
        function checkBirdCollisions(bird) {
            for (const pig of pigs) {
                if (pig.alive && circleCollision(bird, pig)) {
                    pig.alive = false;
                    score += 100;
                    bird.vx *= 0.5;
                    bird.vy *= 0.5;
                    updateStats();
                }
            }
            
            for (let i = 0; i < blocks.length; i++) {
                const block = blocks[i];
                if (circleRectCollision(bird, block)) {
                    block.health--;
                    if (block.health <= 0) {
                        blocks.splice(i, 1);
                        i--;
                        score += 50;
                    }
                    bird.vx *= 0.7;
                    bird.vy *= 0.7;
                    updateStats();
                }
            }
        }
        
        function circleCollision(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.sqrt(dx*dx + dy*dy) < a.radius + b.radius;
        }
        
        function circleRectCollision(circle, rect) {
            const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            const closestY = Math.max(rect.y - rect.height, Math.min(circle.y, rect.y));
            const dx = circle.x - closestX;
            const dy = circle.y - closestY;
            return Math.sqrt(dx*dx + dy*dy) < circle.radius;
        }
        
        function nextBird() {
            const unusedBirds = birds.filter(b => !b.launched);
            if (unusedBirds.length > 0) {
                currentBird = unusedBirds[0];
                currentBird.active = true;
                currentBird.x = slingshot.x;
                currentBird.y = slingshot.y;
            }
        }
        
        function checkGameEnd() {
            const alivePigs = pigs.filter(p => p.alive).length;
            const unusedBirds = birds.filter(b => !b.launched).length;
            const activeBirds = birds.filter(b => b.active && b.launched).length;
            
            if (alivePigs === 0) {
                gameState = 'win';
                score += unusedBirds * 200;
                
                // 计算星级
                const stars = unusedBirds >= LEVELS[currentLevel-1].birds - 1 ? 3 : 
                              unusedBirds >= 1 ? 2 : 1;
                
                // 保存进度
                if (!levelProgress.stars[currentLevel] || stars > levelProgress.stars[currentLevel]) {
                    levelProgress.stars[currentLevel] = stars;
                }
                if (currentLevel >= levelProgress.unlocked && currentLevel < LEVELS.length) {
                    levelProgress.unlocked = currentLevel + 1;
                }
                localStorage.setItem('angryBirdsProgress', JSON.stringify(levelProgress));
                
                document.getElementById('msgTitle').textContent = '🎉 胜利!';
                document.getElementById('starsDisplay').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
                document.getElementById('nextBtn').style.display = currentLevel < LEVELS.length ? 'inline-block' : 'none';
                document.getElementById('message').classList.add('visible');
            } else if (unusedBirds === 0 && activeBirds === 0) {
                gameState = 'lose';
                document.getElementById('msgTitle').textContent = '😢 失败!';
                document.getElementById('starsDisplay').textContent = '☆☆☆';
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('message').classList.add('visible');
            }
        }
        
        function nextLevel() {
            if (currentLevel < LEVELS.length) {
                startLevel(currentLevel + 1);
            }
        }
        
        function launchBird() {
            if (!currentBird || currentBird.launched) return;
            
            const dx = slingshot.x - currentBird.x;
            const dy = slingshot.y - currentBird.y;
            
            const power = Math.min(Math.sqrt(dx*dx + dy*dy) / 5, 15);
            const angle = Math.atan2(dy, dx);
            
            currentBird.vx = Math.cos(angle) * power;
            currentBird.vy = Math.sin(angle) * power;
            currentBird.launched = true;
            
            dragging = false;
        }
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, width, height * GROUND_Y_RATIO);
            
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, height * GROUND_Y_RATIO, width, height * (1 - GROUND_Y_RATIO));
            
            drawSlingshot();
            
            if (dragging && currentBird && !currentBird.launched) {
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(slingshot.x - 10, slingshot.y);
                ctx.lineTo(currentBird.x, currentBird.y);
                ctx.moveTo(slingshot.x + 10, slingshot.y);
                ctx.lineTo(currentBird.x, currentBird.y);
                ctx.stroke();
            }
            
            for (const block of blocks) {
                ctx.fillStyle = '#8d6e63';
                ctx.fillRect(block.x, block.y - block.height, block.width, block.height);
                ctx.strokeStyle = '#5d4037';
                ctx.lineWidth = 2;
                ctx.strokeRect(block.x, block.y - block.height, block.width, block.height);
            }
            
            for (const pig of pigs) {
                if (pig.alive) drawPig(pig);
            }
            
            for (const bird of birds) {
                if (bird.active || (bird.launched && bird.y < height)) {
                    drawBird(bird);
                }
            }
            
            const unusedBirds = birds.filter(b => !b.launched && b !== currentBird);
            for (let i = 0; i < unusedBirds.length; i++) {
                const b = unusedBirds[i];
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(slingshot.x - 40 - i * 25, height * GROUND_Y_RATIO - 15, 12, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawSlingshot() {
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(slingshot.x - 15, slingshot.y - 30, 8, 50);
            ctx.fillRect(slingshot.x + 7, slingshot.y - 30, 8, 50);
            ctx.fillRect(slingshot.x - 20, slingshot.y + 20, 40, 15);
        }
        
        function drawBird(bird) {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            ctx.fillStyle = bird.color;
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(5, -4, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(7, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff9800';
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(20, -3);
            ctx.lineTo(20, 5);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-bird.radius + 3, -8);
            ctx.lineTo(-bird.radius + 10, -bird.radius + 5);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawPig(pig) {
            ctx.save();
            ctx.translate(pig.x, pig.y);
            
            ctx.fillStyle = '#81c784';
            ctx.beginPath();
            ctx.arc(0, 0, pig.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#a5d6a7';
            ctx.beginPath();
            ctx.ellipse(0, 3, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#66bb6a';
            ctx.beginPath();
            ctx.arc(-3, 3, 2, 0, Math.PI * 2);
            ctx.arc(3, 3, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-7, -5, 5, 0, Math.PI * 2);
            ctx.arc(7, -5, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-7, -5, 2.5, 0, Math.PI * 2);
            ctx.arc(7, -5, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 事件处理
        canvas.addEventListener('mousedown', e => {
            if (gameState !== 'playing' || !currentBird || currentBird.launched) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (width / rect.width);
            const y = (e.clientY - rect.top) * (height / rect.height);
            dragging = true;
        });
        
        canvas.addEventListener('mousemove', e => {
            if (!dragging) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (width / rect.width);
            const y = (e.clientY - rect.top) * (height / rect.height);
            
            const dx = x - slingshot.x;
            const dy = y - slingshot.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > slingshot.radius) {
                const angle = Math.atan2(dy, dx);
                currentBird.x = slingshot.x + Math.cos(angle) * slingshot.radius;
                currentBird.y = slingshot.y + Math.sin(angle) * slingshot.radius;
            } else {
                currentBird.x = x;
                currentBird.y = y;
            }
        });
        
        canvas.addEventListener('mouseup', () => { if (dragging) launchBird(); });
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (gameState !== 'playing' || !currentBird || currentBird.launched) return;
            dragging = true;
        }, {passive: false});
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!dragging) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (width / rect.width);
            const y = (touch.clientY - rect.top) * (height / rect.height);
            
            const dx = x - slingshot.x;
            const dy = y - slingshot.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > slingshot.radius) {
                const angle = Math.atan2(dy, dx);
                currentBird.x = slingshot.x + Math.cos(angle) * slingshot.radius;
                currentBird.y = slingshot.y + Math.sin(angle) * slingshot.radius;
            } else {
                currentBird.x = x;
                currentBird.y = y;
            }
        }, {passive: false});
        
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (dragging) launchBird();
        }, {passive: false});
        
        window.addEventListener('resize', resize);
        
        // 初始化显示关卡选择
        showLevelSelect();
    </script>
</body>
</html>
