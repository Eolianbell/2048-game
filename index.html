<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ========== 主题系统 ========== */
        :root {
            /* 经典主题 (默认) */
            --bg-color: #faf8ef;
            --text-color: #776e65;
            --grid-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --btn-bg: #8f7a66;
            --btn-hover: #9f8a76;
            --score-bg: #bbada0;
            --score-label: #eee4da;
            --score-value: #ffffff;
            --message-bg: rgba(238, 228, 218, 0.8);
            /* 网格大小 */
            --grid-size: 4;
            --cell-size: 100px;
            --gap-size: 10px;
        }
        
        /* 黑暗主题 */
        body.theme-dark {
            --bg-color: #1a1a2e;
            --text-color: #eaeaea;
            --grid-bg: #16213e;
            --cell-bg: rgba(255, 255, 255, 0.1);
            --btn-bg: #0f3460;
            --btn-hover: #1a4a7a;
            --score-bg: #0f3460;
            --score-label: #a0a0a0;
            --score-value: #ffffff;
            --message-bg: rgba(26, 26, 46, 0.9);
        }
        
        /* 蓝色主题 */
        body.theme-blue {
            --bg-color: #e3f2fd;
            --text-color: #1565c0;
            --grid-bg: #1976d2;
            --cell-bg: rgba(255, 255, 255, 0.4);
            --btn-bg: #1565c0;
            --btn-hover: #1976d2;
            --score-bg: #1976d2;
            --score-label: #bbdefb;
            --score-value: #ffffff;
            --message-bg: rgba(227, 242, 253, 0.9);
        }
        
        /* 绿色主题 */
        body.theme-green {
            --bg-color: #e8f5e9;
            --text-color: #2e7d32;
            --grid-bg: #43a047;
            --cell-bg: rgba(255, 255, 255, 0.4);
            --btn-bg: #2e7d32;
            --btn-hover: #388e3c;
            --score-bg: #43a047;
            --score-label: #c8e6c9;
            --score-value: #ffffff;
            --message-bg: rgba(232, 245, 233, 0.9);
        }
        
        /* 粉色主题 */
        body.theme-pink {
            --bg-color: #fce4ec;
            --text-color: #c2185b;
            --grid-bg: #ec407a;
            --cell-bg: rgba(255, 255, 255, 0.4);
            --btn-bg: #c2185b;
            --btn-hover: #d81b60;
            --score-bg: #ec407a;
            --score-label: #f8bbd9;
            --score-value: #ffffff;
            --message-bg: rgba(252, 228, 236, 0.9);
        }
        
        body {
            font-family: Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
        }
        
        h1 {
            color: var(--text-color);
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        /* ========== 控制栏 ========== */
        .controls-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--grid-bg);
            padding: 8px 12px;
            border-radius: 6px;
        }
        
        .control-label {
            color: var(--score-label);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        select {
            background: var(--btn-bg);
            color: var(--score-value);
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        
        select:hover {
            background: var(--btn-hover);
        }
        
        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            padding: 0;
            display: inline-block;
        }
        
        .theme-btn:hover {
            transform: scale(1.15);
        }
        
        .theme-btn.active {
            border-color: var(--score-value);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        
        .theme-classic { background: linear-gradient(135deg, #bbada0, #c4b5a7); }
        .theme-dark { background: linear-gradient(135deg, #16213e, #1f2f52); }
        .theme-blue { background: linear-gradient(135deg, #1976d2, #2196f3); }
        .theme-green { background: linear-gradient(135deg, #43a047, #66bb6a); }
        .theme-pink { background: linear-gradient(135deg, #ec407a, #f06292); }
        
        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .new-game-btn {
            background: var(--btn-bg);
            color: var(--score-value);
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 25px; /* 增加与游戏界面的间距 */
        }
        
        .new-game-btn:hover {
            background: var(--btn-hover);
        }
        
        .score-box {
            background: var(--score-bg);
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
        }
        
        .score-label {
            color: var(--score-label);
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .score-value {
            color: var(--score-value);
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-container {
            background: var(--grid-bg);
            border-radius: 10px;
            padding: 10px;
            position: relative;
            touch-action: none;
            transition: background 0.3s ease;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), var(--cell-size));
            grid-template-rows: repeat(var(--grid-size), var(--cell-size));
            gap: var(--gap-size);
        }
        
        .grid-cell {
            background: var(--cell-bg);
            border-radius: 6px;
        }
        
        .tile {
            position: absolute;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.15s ease;
            z-index: 10;
        }
        
        .tile-new {
            animation: appear 0.2s ease;
        }
        
        .tile-merged {
            animation: pop 0.2s ease;
        }
        
        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Tile 颜色 - 经典主题 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; }
        .tile-256 { background: #edcc61; color: #f9f6f2; }
        .tile-512 { background: #edc850; color: #f9f6f2; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; }
        .tile-super { background: #3c3a32; color: #f9f6f2; }
        
        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--message-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .game-message.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-message p {
            font-size: 48px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 20px;
        }
        
        /* 游戏结束弹窗中的按钮 */
        .game-message button {
            background: var(--btn-bg);
            color: var(--score-value);
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .game-message button:hover {
            background: var(--btn-hover);
        }
        
        .instructions {
            margin-top: 20px;
            color: var(--text-color);
            font-size: 14px;
            text-align: center;
        }
        
        /* ========== 移动端适配 ========== */
        @media (max-width: 500px) {
            body {
                padding: 10px;
                justify-content: center;
            }
            
            h1 {
                font-size: 32px;
                margin-bottom: 5px;
            }
            
            .controls-container {
                gap: 10px;
                margin-bottom: 10px;
            }
            
            .control-group {
                padding: 6px 10px;
            }
            
            .control-label {
                font-size: 10px;
            }
            
            select {
                font-size: 12px;
                padding: 4px 8px;
            }
            
            .theme-btn {
                width: 28px;
                height: 28px;
                border-radius: 50%;
            }
            
            .grid-container {
                --cell-size: min(50px, calc((100vw - 40px - (var(--grid-size) - 1) * 6px) / var(--grid-size)));
                --gap-size: 6px;
                grid-template-columns: repeat(var(--grid-size), var(--cell-size));
                grid-template-rows: repeat(var(--grid-size), var(--cell-size));
                gap: var(--gap-size);
            }
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    
    <!-- 控制栏 -->
    <div class="controls-container">
        <!-- 难度选择 -->
        <div class="control-group">
            <span class="control-label">难度</span>
            <select id="difficulty-select" onchange="changeDifficulty()">
                <option value="3">🔥 地狱 (3×3)</option>
                <option value="4" selected>⭐ 经典 (4×4)</option>
                <option value="5">😊 简单 (5×5)</option>
                <option value="6">👶 新手 (6×6)</option>
            </select>
        </div>
        
        <!-- 主题选择 -->
        <div class="control-group">
            <span class="control-label">主题</span>
            <button class="theme-btn theme-classic active" onclick="changeTheme('classic')" title="经典"></button>
            <button class="theme-btn theme-dark" onclick="changeTheme('dark')" title="黑暗"></button>
            <button class="theme-btn theme-blue" onclick="changeTheme('blue')" title="蓝色"></button>
            <button class="theme-btn theme-green" onclick="changeTheme('green')" title="绿色"></button>
            <button class="theme-btn theme-pink" onclick="changeTheme('pink')" title="粉色"></button>
        </div>
    </div>
    
    <div class="score-container">
        <div class="score-box">
            <div class="score-label">得分</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">最高分</div>
            <div class="score-value" id="best-score">0</div>
        </div>
    </div>
    
    <button onclick="initGame()" class="new-game-btn">新游戏</button>
    
    <div class="game-container">
        <div class="grid-container" id="grid-container"></div>
        <div class="game-message" id="game-message">
            <p id="message-text">游戏结束!</p>
            <button onclick="initGame()">再试一次</button>
        </div>
    </div>
    
    <div class="instructions">
        使用方向键或 WASD 移动方块<br>
        <span id="goal-text">相同数字的方块合并，目标是得到 2048！</span>
    </div>

    <script>
        let gridSize = 4;
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let hasWon = false;
        let currentTheme = localStorage.getItem('theme') || 'classic';
        let currentDifficulty = localStorage.getItem('difficulty') || '4';

        // 初始化设置
        document.getElementById('best-score').textContent = bestScore;
        document.getElementById('difficulty-select').value = currentDifficulty;
        changeTheme(currentTheme);
        
        // 设置难度和 CSS 变量
        gridSize = parseInt(currentDifficulty);
        const root = document.documentElement;
        root.style.setProperty('--grid-size', gridSize.toString());
        const isMobile = window.innerWidth <= 500;
        root.style.setProperty('--gap-size', (isMobile ? 6 : 10) + 'px');
        
        // 更新目标文字
        updateGoalText();

        function changeTheme(theme) {
            // 移除所有主题类
            document.body.classList.remove('theme-dark', 'theme-blue', 'theme-green', 'theme-pink');
            
            // 添加新主题类
            if (theme !== 'classic') {
                document.body.classList.add('theme-' + theme);
            }
            
            // 更新按钮状态
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector('.theme-' + theme).classList.add('active');
            
            // 保存主题
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }

        function updateGoalText() {
            const target = getWinTarget();
            const goalText = document.getElementById('goal-text');
            if (goalText) {
                goalText.textContent = `相同数字的方块合并，目标是得到 ${target}！`;
            }
        }

        function changeDifficulty() {
            const select = document.getElementById('difficulty-select');
            gridSize = parseInt(select.value);
            localStorage.setItem('difficulty', gridSize.toString());
            currentDifficulty = gridSize.toString();
            
            // 更新 CSS 变量
            const root = document.documentElement;
            root.style.setProperty('--grid-size', gridSize.toString());
            
            // 直接设置 grid-container 样式，确保生效
            const gridContainer = document.getElementById('grid-container');
            const isMobile = window.innerWidth <= 500;
            const gap = isMobile ? 6 : 10;
            root.style.setProperty('--gap-size', gap + 'px');
            
            // 更新目标文字
            updateGoalText();
            
            initGame();
        }

        function initGame() {
            board = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            hideMessage();
            createGrid();
            addNewTile();
            addNewTile();
            render();
        }

        function createGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                container.appendChild(cell);
            }
        }

        function addNewTile() {
            const emptyCells = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return {r, c, value: board[r][c]};
            }
            return null;
        }

        function getCellSize() {
            const container = document.getElementById('grid-container');
            const cell = container.querySelector('.grid-cell');
            return cell ? cell.getBoundingClientRect() : { width: 100, height: 100 };
        }

        function getTileSize(cellSize) {
            // 根据网格大小动态调整字体
            if (gridSize <= 4) return { fontSize: 35, smallFont: 25 };
            if (gridSize === 5) return { fontSize: 28, smallFont: 20 };
            return { fontSize: 22, smallFont: 16 };
        }

        function render() {
            const container = document.getElementById('grid-container');
            const cellSize = getCellSize();
            // 从 CSS 变量获取 gap
            const computedStyle = getComputedStyle(document.documentElement);
            const gap = parseFloat(computedStyle.getPropertyValue('--gap-size')) || 10;
            const padding = window.innerWidth <= 500 ? 8 : 10;
            const tileSize = getTileSize(cellSize);
            
            // 清除旧的 tile
            const oldTiles = container.querySelectorAll('.tile');
            oldTiles.forEach(tile => tile.remove());

            // 渲染新的 tile
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] !== 0) {
                        const tile = document.createElement('div');
                        const value = board[r][c];
                        let className = `tile tile-${value <= 2048 ? value : 'super'}`;
                        tile.className = className;
                        tile.textContent = value;
                        tile.style.left = `${padding + c * (cellSize.width + gap)}px`;
                        tile.style.top = `${padding + r * (cellSize.height + gap)}px`;
                        tile.style.width = `${cellSize.width}px`;
                        tile.style.height = `${cellSize.height}px`;
                        
                        // 根据数字大小和网格调整字体
                        if (value >= 128 && value < 1024) {
                            tile.style.fontSize = `${tileSize.smallFont + 5}px`;
                        } else if (value >= 1024) {
                            tile.style.fontSize = `${tileSize.smallFont}px`;
                        } else {
                            tile.style.fontSize = `${tileSize.fontSize}px`;
                        }
                        
                        container.appendChild(tile);
                    }
                }
            }
        }

        function renderWithAnimation(newTile) {
            render();
            if (newTile) {
                const container = document.getElementById('grid-container');
                const cellSize = getCellSize();
                const computedStyle = getComputedStyle(document.documentElement);
                const gap = parseFloat(computedStyle.getPropertyValue('--gap-size')) || 10;
                const padding = window.innerWidth <= 500 ? 8 : 10;
                const expectedLeft = padding + newTile.c * (cellSize.width + gap);
                const expectedTop = padding + newTile.r * (cellSize.height + gap);
                
                const tiles = document.querySelectorAll('.tile');
                tiles.forEach(tile => {
                    const left = parseFloat(tile.style.left);
                    const top = parseFloat(tile.style.top);
                    if (Math.abs(left - expectedLeft) < 1 && Math.abs(top - expectedTop) < 1) {
                        tile.classList.add('tile-new');
                    }
                });
            }
        }

        function move(direction) {
            const previousBoard = board.map(row => [...row]);
            let moved = false;
            let mergedPositions = [];

            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < gridSize; r++) {
                    let row = [...board[r]];
                    if (direction === 'right') row.reverse();
                    
                    const result = processLine(row);
                    row = result.line;
                    mergedPositions.push(...result.mergedIndices.map(i => direction === 'right' ? 
                        {r, c: gridSize - 1 - i} : {r, c: i}));
                    
                    if (direction === 'right') row.reverse();
                    
                    for (let c = 0; c < gridSize; c++) {
                        if (board[r][c] !== row[c]) moved = true;
                        board[r][c] = row[c];
                    }
                }
            } else {
                for (let c = 0; c < gridSize; c++) {
                    let col = [];
                    for (let r = 0; r < gridSize; r++) {
                        col.push(board[r][c]);
                    }
                    if (direction === 'down') col.reverse();
                    
                    const result = processLine(col);
                    col = result.line;
                    mergedPositions.push(...result.mergedIndices.map(i => direction === 'down' ? 
                        {r: gridSize - 1 - i, c} : {r: i, c}));
                    
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < gridSize; r++) {
                        if (board[r][c] !== col[r]) moved = true;
                        board[r][c] = col[r];
                    }
                }
            }

            if (moved) {
                const newTile = addNewTile();
                updateScore();
                renderWithAnimation(newTile);
                
                if (!hasWon && checkWin()) {
                    hasWon = true;
                    const target = getWinTarget();
                    showMessage(`恭喜！达成 ${target}!`, false);
                } else if (checkGameOver()) {
                    showMessage('游戏结束!', true);
                }
            }
        }

        function processLine(line) {
            let newLine = line.filter(val => val !== 0);
            let mergedIndices = [];
            
            for (let i = 0; i < newLine.length - 1; i++) {
                if (newLine[i] === newLine[i + 1]) {
                    newLine[i] *= 2;
                    score += newLine[i];
                    mergedIndices.push(i);
                    newLine.splice(i + 1, 1);
                }
            }
            
            while (newLine.length < gridSize) {
                newLine.push(0);
            }
            
            return {line: newLine, mergedIndices};
        }

        function getWinTarget() {
            // 不同难度有不同的获胜目标
            if (gridSize === 3) return 512;    // 地狱：3×3 格子太少，目标 512
            if (gridSize === 4) return 2048;   // 经典：原版 2048
            if (gridSize === 5) return 4096;   // 简单：5×5 可以挑战 4096
            return 8192;                        // 新手：6×6 随便玩到 8192
        }

        function checkWin() {
            const target = getWinTarget();
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === target) return true;
                }
            }
            return false;
        }

        function checkGameOver() {
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const val = board[r][c];
                    if ((r < gridSize - 1 && board[r + 1][c] === val) ||
                        (c < gridSize - 1 && board[r][c + 1] === val)) {
                        return false;
                    }
                }
            }
            return true;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function showMessage(text, gameOver) {
            const msgEl = document.getElementById('game-message');
            document.getElementById('message-text').textContent = text;
            msgEl.classList.add('visible');
        }

        function hideMessage() {
            document.getElementById('game-message').classList.remove('visible');
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    move('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    move('right');
                    break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipe = 50;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                move(dx > 0 ? 'right' : 'left');
            } else if (Math.abs(dy) > minSwipe) {
                move(dy > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        initGame();
    </script>
</body>
</html>
