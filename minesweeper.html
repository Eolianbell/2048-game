<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-color: #1a1a2e;
            --board-bg: #16213e;
            --cell-bg: #0f3460;
            --cell-revealed: rgba(255,255,255,0.1);
            --text-color: #eee;
            --accent: #e94560;
            --mine-color: #e94560;
            --flag-color: #ffeb3b;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            height: 100dvh;
            touch-action: none;
            user-select: none;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        
        .control-group {
            background: var(--board-bg);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-label {
            color: #aaa;
            font-size: 11px;
        }
        
        select {
            background: var(--cell-bg);
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .stat-box {
            background: var(--board-bg);
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 10px;
        }
        
        .stat-value {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
        
        .stat-value.mines {
            color: var(--mine-color);
        }
        
        .stat-value.flags {
            color: var(--flag-color);
        }
        
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            width: 100%;
        }
        
        .game-container {
            background: var(--board-bg);
            border-radius: 10px;
            padding: 8px;
            border: 2px solid #0f3460;
            position: relative;
        }
        
        .game-board {
            display: grid;
            gap: 2px;
            background: rgba(0,0,0,0.3);
        }
        
        .cell {
            width: var(--cell-size, 30px);
            height: var(--cell-size, 30px);
            background: var(--cell-bg);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: calc(var(--cell-size, 30px) * 0.5);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            color: #fff;
        }
        
        .cell:hover {
            background: #1a4a7a;
        }
        
        .cell.revealed {
            background: var(--cell-revealed);
            cursor: default;
        }
        
        .cell.revealed:hover {
            background: var(--cell-revealed);
        }
        
        .cell.flagged {
            background: #2a4a6a;
        }
        
        .cell.flagged::after {
            content: '🚩';
            font-size: calc(var(--cell-size, 30px) * 0.6);
        }
        
        .cell.mine {
            background: var(--mine-color);
        }
        
        .cell.mine::after {
            content: '💣';
            font-size: calc(var(--cell-size, 30px) * 0.6);
        }
        
        .cell.exploded {
            background: #ff0000;
            animation: explode 0.3s ease;
        }
        
        @keyframes explode {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* 数字颜色 */
        .cell.num-1 { color: #448aff; }
        .cell.num-2 { color: #4caf50; }
        .cell.num-3 { color: #e94560; }
        .cell.num-4 { color: #9c27b0; }
        .cell.num-5 { color: #ff9800; }
        .cell.num-6 { color: #00bcd4; }
        .cell.num-7 { color: #795548; }
        .cell.num-8 { color: #607d8b; }
        
        .game-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        
        .game-message.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-message p {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .game-message.win p {
            color: #4caf50;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-shrink: 0;
        }
        
        .btn {
            background: var(--cell-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn:hover { background: #1a4a7a; }
        .btn-accent { background: var(--accent); }
        
        .instructions {
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
            text-align: center;
        }
        
        /* 移动端 */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            
            h1 {
                font-size: 18px;
                margin-bottom: 5px;
            }
            
            .controls-row {
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 8px;
            }
            
            .control-group {
                padding: 4px 8px;
            }
            
            select {
                font-size: 11px;
                padding: 4px 6px;
            }
            
            .stat-box {
                padding: 4px 8px;
            }
            
            .stat-value {
                font-size: 14px;
            }
            
            .game-container {
                padding: 5px;
                border-width: 1px;
            }
            
            .btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <h1>💣 扫雷</h1>
    
    <div class="controls-row">
        <div class="control-group">
            <span class="control-label">难度</span>
            <select id="difficulty" onchange="changeDifficulty()">
                <option value="easy">简单 (9×9)</option>
                <option value="medium" selected>中等 (16×16)</option>
                <option value="hard">困难 (20×15)</option>
            </select>
        </div>
        <div class="stat-box">
            <div class="stat-label">💣 剩余</div>
            <div class="stat-value mines" id="mines">40</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🚩 标记</div>
            <div class="stat-value flags" id="flags">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">⏱️ 时间</div>
            <div class="stat-value" id="time">0</div>
        </div>
    </div>
    
    <div class="game-area">
        <div class="game-container">
            <div class="game-board" id="board"></div>
            <div class="game-message" id="message">
                <p id="msg-text">游戏结束!</p>
                <button class="btn btn-accent" onclick="startGame()">再来一局</button>
            </div>
        </div>
    </div>
    
    <div class="btn-row">
        <button class="btn btn-accent" onclick="startGame()">新游戏</button>
        <button class="btn" onclick="window.location.href='index.html'">返回</button>
    </div>
    
    <div class="instructions">
        点击揭开 | 长按/右键 标记旗帜 | 数字表示周围地雷数
    </div>

    <script>
        const DIFFICULTIES = {
            easy: { cols: 9, rows: 9, mines: 10 },
            medium: { cols: 16, rows: 16, mines: 40 },
            hard: { cols: 20, rows: 15, mines: 50 }
        };
        
        let cols, rows, mineCount;
        let board = [];
        let revealed = [];
        let flagged = [];
        let minesPos = [];
        let gameOver = false;
        let gameWon = false;
        let firstClick = true;
        let timer = null;
        let time = 0;
        
        function calcSize() {
            const vw = window.innerWidth;
            const vh = window.innerHeight || 600;
            
            if (vw > 600) return 30;
            
            const topH = 80;
            const btnH = 50;
            const availableH = vh - topH - btnH - 25;
            const availableW = vw - 25;
            
            const cellH = Math.floor(availableH / rows);
            const cellW = Math.floor(availableW / cols);
            
            return Math.max(18, Math.min(28, Math.min(cellH, cellW)));
        }
        
        function applySize() {
            const s = calcSize();
            document.documentElement.style.setProperty('--cell-size', s + 'px');
            document.getElementById('board').style.gridTemplateColumns = `repeat(${cols}, ${s}px)`;
            document.getElementById('board').style.gridTemplateRows = `repeat(${rows}, ${s}px)`;
        }
        
        function createBoard() {
            const el = document.getElementById('board');
            el.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;
                    el.appendChild(cell);
                }
            }
        }
        
        function changeDifficulty() {
            const d = document.getElementById('difficulty').value;
            cols = DIFFICULTIES[d].cols;
            rows = DIFFICULTIES[d].rows;
            mineCount = DIFFICULTIES[d].mines;
            startGame();
        }
        
        function startGame() {
            const d = document.getElementById('difficulty').value || 'medium';
            cols = DIFFICULTIES[d].cols;
            rows = DIFFICULTIES[d].rows;
            mineCount = DIFFICULTIES[d].mines;
            
            board = Array(rows).fill(null).map(() => Array(cols).fill(0));
            revealed = Array(rows).fill(null).map(() => Array(cols).fill(false));
            flagged = Array(rows).fill(null).map(() => Array(cols).fill(false));
            minesPos = [];
            gameOver = false;
            gameWon = false;
            firstClick = true;
            time = 0;
            
            if (timer) clearInterval(timer);
            
            document.getElementById('mines').textContent = mineCount;
            document.getElementById('flags').textContent = 0;
            document.getElementById('time').textContent = 0;
            hideMsg();
            applySize();
            createBoard();
            
            // 添加点击事件
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.getElementById(`c-${r}-${c}`);
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    // 点击事件（检查是否被长按阻止）
                    cell.addEventListener('click', function(e) {
                        if (this.dataset.longPress === 'true') {
                            this.dataset.longPress = 'false';
                            e.preventDefault();
                            return;
                        }
                        handleClick(r, c);
                    });
                    
                    // 右键标记
                    cell.addEventListener('contextmenu', e => {
                        e.preventDefault();
                        handleFlag(r, c);
                    });
                    
                    // 长按标记（移动端）
                    let pressTimer;
                    
                    cell.addEventListener('touchstart', function(e) {
                        this.dataset.longPress = 'false';
                        const self = this;
                        pressTimer = setTimeout(() => {
                            self.dataset.longPress = 'true';
                            handleFlag(r, c);
                        }, 400);
                    }, {passive: true});
                    
                    cell.addEventListener('touchend', function() {
                        clearTimeout(pressTimer);
                    }, {passive: true});
                }
            }
        }
        
        function placeMines(safeR, safeC) {
            // 避开第一次点击的位置及周围
            const safeZone = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    safeZone.push({r: safeR + dr, c: safeC + dc});
                }
            }
            
            minesPos = [];
            while (minesPos.length < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                
                if (!safeZone.some(s => s.r === r && s.c === c) &&
                    !minesPos.some(m => m.r === r && m.c === c)) {
                    minesPos.push({r, c});
                    board[r][c] = -1;  // -1 表示地雷
                }
            }
            
            // 计算数字
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = countMines(r, c);
                    }
                }
            }
            
            // 启动计时器
            timer = setInterval(() => {
                time++;
                document.getElementById('time').textContent = time;
            }, 1000);
        }
        
        function countMines(r, c) {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                        if (board[nr][nc] === -1) count++;
                    }
                }
            }
            return count;
        }
        
        function handleClick(r, c) {
            if (gameOver || gameWon || flagged[r][c] || revealed[r][c]) return;
            
            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
            }
            
            reveal(r, c);
            checkWin();
        }
        
        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            const cell = document.getElementById(`c-${r}-${c}`);
            cell.classList.add('revealed');
            
            if (board[r][c] === -1) {
                // 踩雷
                cell.classList.add('mine', 'exploded');
                endGame(false);
                return;
            }
            
            if (board[r][c] > 0) {
                cell.textContent = board[r][c];
                cell.classList.add(`num-${board[r][c]}`);
            } else {
                // 空格，递归展开
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }
        
        function handleFlag(r, c) {
            if (gameOver || gameWon || revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            const cell = document.getElementById(`c-${r}-${c}`);
            
            if (flagged[r][c]) {
                cell.classList.add('flagged');
                cell.textContent = '';
            } else {
                cell.classList.remove('flagged');
            }
            
            updateFlagCount();
        }
        
        function updateFlagCount() {
            let count = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (flagged[r][c]) count++;
                }
            }
            document.getElementById('flags').textContent = count;
            document.getElementById('mines').textContent = mineCount - count;
        }
        
        function checkWin() {
            let revealedCount = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (revealed[r][c]) revealedCount++;
                }
            }
            
            if (revealedCount === cols * rows - mineCount) {
                endGame(true);
            }
        }
        
        function endGame(won) {
            gameOver = true;
            gameWon = won;
            if (timer) clearInterval(timer);
            
            // 显示所有地雷
            if (!won) {
                minesPos.forEach(m => {
                    const cell = document.getElementById(`c-${m.r}-${m.c}`);
                    if (!revealed[m.r][m.c]) {
                        cell.classList.add('mine');
                    }
                });
            }
            
            const msgEl = document.getElementById('message');
            const textEl = document.getElementById('msg-text');
            
            if (won) {
                textEl.textContent = `恭喜！用时 ${time} 秒`;
                msgEl.classList.add('win');
            } else {
                textEl.textContent = '踩雷了!';
                msgEl.classList.remove('win');
            }
            
            msgEl.classList.add('visible');
        }
        
        function showMsg(t) {
            document.getElementById('msg-text').textContent = t;
            document.getElementById('message').classList.add('visible');
        }
        
        function hideMsg() {
            document.getElementById('message').classList.remove('visible');
        }
        
        window.addEventListener('resize', applySize);
        window.addEventListener('orientationchange', () => setTimeout(applySize, 100));
        
        // 初始化
        changeDifficulty();
    </script>
</body>
</html>
