<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --cell-size: 30px;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            min-height: 100vh;
            user-select: none;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .controls-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-group, .stat-box {
            background: #16213e;
            padding: 6px 12px;
            border-radius: 8px;
        }
        
        .control-label, .stat-label {
            color: #aaa;
            font-size: 11px;
        }
        
        select {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .stat-value {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
        
        .stat-value.mines { color: #e94560; }
        .stat-value.flags { color: #ffeb3b; }
        
        .game-area {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-container {
            background: #16213e;
            border-radius: 10px;
            padding: 8px;
            border: 2px solid #0f3460;
            position: relative;
        }
        
        .game-board {
            display: grid;
            gap: 2px;
            background: rgba(0,0,0,0.3);
        }
        
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #0f3460;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }
        
        .cell:hover { background: #1a4a7a; }
        
        .cell.revealed {
            background: rgba(255,255,255,0.1);
            cursor: default;
        }
        
        .cell.flagged::after { content: '🚩'; }
        
        .cell.mine::after { content: '💣'; }
        
        .cell.exploded { background: #ff0000; }
        
        .num-1 { color: #448aff; }
        .num-2 { color: #4caf50; }
        .num-3 { color: #e94560; }
        .num-4 { color: #9c27b0; }
        .num-5 { color: #ff9800; }
        .num-6 { color: #00bcd4; }
        .num-7 { color: #795548; }
        .num-8 { color: #607d8b; }
        
        .game-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26,26,46,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        
        .game-message.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-message.win p { color: #4caf50; }
        
        .game-message p {
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn {
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn:hover { background: #1a4a7a; }
        .btn-accent { background: #e94560; }
        
        .instructions {
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 18px; }
            .controls-row { gap: 8px; margin-bottom: 8px; }
            .stat-value { font-size: 14px; }
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <h1>💣 扫雷</h1>
    
    <div class="controls-row">
        <div class="control-group">
            <span class="control-label">难度</span>
            <select id="difficulty" onchange="startGame()">
                <option value="easy">简单 (9×9)</option>
                <option value="medium" selected>中等 (16×16)</option>
                <option value="hard">困难 (20×15)</option>
            </select>
        </div>
        <div class="stat-box">
            <div class="stat-label">💣 剩余</div>
            <div class="stat-value mines" id="mines">40</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🚩 标记</div>
            <div class="stat-value flags" id="flags">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">⏱️ 时间</div>
            <div class="stat-value" id="time">0</div>
        </div>
    </div>
    
    <div class="game-area">
        <div class="game-container">
            <div class="game-board" id="board"></div>
            <div class="game-message" id="msg">
                <p id="msg-text">游戏结束!</p>
                <button class="btn btn-accent" onclick="startGame()">再来一局</button>
            </div>
        </div>
    </div>
    
    <div class="btn-row">
        <button class="btn btn-accent" onclick="startGame()">新游戏</button>
        <button class="btn" onclick="location.href='index.html'">返回</button>
    </div>
    
    <div class="instructions">
        点击揭开 | 长按/右键 标记旗帜
    </div>

    <script>
        const DIFF = {
            easy: { cols: 9, rows: 9, mines: 10 },
            medium: { cols: 16, rows: 16, mines: 40 },
            hard: { cols: 20, rows: 15, mines: 50 }
        };
        
        let cols = 16, rows = 16, mineCount = 40;
        let board = [], revealed = [], flagged = [];
        let gameOver = false, gameWon = false, firstClick = true;
        let timer = null, time = 0;
        let longPress = false;
        let pressTimer = null;
        
        function calcSize() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const s = vw > 600 ? 30 : Math.min(28, Math.floor((vh - 160) / rows), Math.floor((vw - 30) / cols));
            return Math.max(18, s);
        }
        
        function applySize() {
            const s = calcSize();
            document.documentElement.style.setProperty('--cell-size', s + 'px');
            document.getElementById('board').style.gridTemplateColumns = `repeat(${cols}, ${s}px)`;
            document.getElementById('board').style.gridTemplateRows = `repeat(${rows}, ${s}px)`;
        }
        
        function createBoard() {
            const el = document.getElementById('board');
            el.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    el.appendChild(cell);
                }
            }
        }
        
        function startGame() {
            const d = document.getElementById('difficulty').value;
            cols = DIFF[d].cols;
            rows = DIFF[d].rows;
            mineCount = DIFF[d].mines;
            
            board = [];
            revealed = [];
            flagged = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                revealed[r] = [];
                flagged[r] = [];
                for (let c = 0; c < cols; c++) {
                    board[r][c] = 0;
                    revealed[r][c] = false;
                    flagged[r][c] = false;
                }
            }
            
            gameOver = false;
            gameWon = false;
            firstClick = true;
            time = 0;
            if (timer) clearInterval(timer);
            
            document.getElementById('mines').textContent = mineCount;
            document.getElementById('flags').textContent = 0;
            document.getElementById('time').textContent = 0;
            document.getElementById('msg').classList.remove('visible');
            
            applySize();
            createBoard();
        }
        
        function placeMines(sr, sc) {
            const safe = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    safe.push({r: sr + dr, c: sc + dc});
                }
            }
            
            let count = 0;
            while (count < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                if (!safe.some(s => s.r === r && s.c === c) && board[r][c] !== -1) {
                    board[r][c] = -1;
                    count++;
                }
            }
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = countNear(r, c);
                    }
                }
            }
            
            timer = setInterval(() => {
                time++;
                document.getElementById('time').textContent = time;
            }, 1000);
        }
        
        function countNear(r, c) {
            let n = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) n++;
                }
            }
            return n;
        }
        
        function handleClick(r, c) {
            if (gameOver || revealed[r][c] || flagged[r][c]) return;
            
            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
            }
            
            reveal(r, c);
            checkWin();
        }
        
        function handleFlag(r, c) {
            if (gameOver || revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            cell.classList.toggle('flagged');
            
            updateFlags();
        }
        
        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            cell.classList.add('revealed');
            
            if (board[r][c] === -1) {
                cell.classList.add('mine', 'exploded');
                endGame(false);
                return;
            }
            
            if (board[r][c] > 0) {
                cell.textContent = board[r][c];
                cell.classList.add('num-' + board[r][c]);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }
        
        function updateFlags() {
            let f = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (flagged[r][c]) f++;
                }
            }
            document.getElementById('flags').textContent = f;
            document.getElementById('mines').textContent = mineCount - f;
        }
        
        function checkWin() {
            let rev = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (revealed[r][c]) rev++;
                }
            }
            if (rev === cols * rows - mineCount) endGame(true);
        }
        
        function endGame(win) {
            gameOver = true;
            gameWon = win;
            if (timer) clearInterval(timer);
            
            if (!win) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (board[r][c] === -1) {
                            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                            cell.classList.add('mine');
                        }
                    }
                }
            }
            
            const msg = document.getElementById('msg');
            const txt = document.getElementById('msg-text');
            txt.textContent = win ? `恭喜！用时 ${time}秒` : '踩雷了！';
            msg.classList.toggle('win', win);
            msg.classList.add('visible');
        }
        
        // 事件处理
        document.getElementById('board').addEventListener('click', e => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            if (longPress) {
                longPress = false;
                return;
            }
            handleClick(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
        });
        
        document.getElementById('board').addEventListener('contextmenu', e => {
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            handleFlag(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
        });
        
        document.getElementById('board').addEventListener('touchstart', e => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            longPress = false;
            pressTimer = setTimeout(() => {
                longPress = true;
                handleFlag(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
            }, 400);
        }, {passive: true});
        
        document.getElementById('board').addEventListener('touchend', () => {
            if (pressTimer) clearTimeout(pressTimer);
        }, {passive: true});
        
        window.addEventListener('resize', applySize);
        
        // 初始化
        startGame();
    </script>
</body>
</html>
