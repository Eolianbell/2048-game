<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-color: #1a1a2e;
            --board-bg: #16213e;
            --snake-color: #4caf50;
            --snake-head: #76ff03;
            --food-color: #e94560;
            --text-color: #eee;
            --btn-bg: #0f3460;
            --accent: #e94560;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            height: 100dvh;
            touch-action: none;
            user-select: none;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        .score-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        
        .score-box {
            background: var(--btn-bg);
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .score-label {
            color: #aaa;
            font-size: 11px;
        }
        
        .score-value {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }
        
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            width: 100%;
        }
        
        .game-container {
            background: var(--board-bg);
            border-radius: 10px;
            padding: 8px;
            border: 2px solid #0f3460;
            position: relative;
        }
        
        .game-board {
            display: grid;
            gap: 1px;
            background: rgba(0,0,0,0.3);
        }
        
        .cell {
            border-radius: 3px;
            background: rgba(255,255,255,0.05);
        }
        
        .cell.snake {
            background: var(--snake-color);
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2);
        }
        
        .cell.snake-head {
            background: var(--snake-head);
            box-shadow: 0 0 8px var(--snake-head);
        }
        
        .cell.food {
            background: var(--food-color);
            box-shadow: 0 0 10px var(--food-color);
            animation: pulse 0.5s ease infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
        
        .game-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        
        .game-message.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-message p {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-shrink: 0;
        }
        
        .btn {
            background: var(--btn-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn:hover { background: #1a4a7a; }
        .btn-accent { background: var(--accent); }
        
        /* PC端控制按钮 */
        .controls-pc {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-left: 20px;
        }
        
        .controls-pc .btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
        }
        
        .instructions {
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
            text-align: center;
        }
        
        /* 移动端 */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            
            h1 {
                font-size: 18px;
                margin-bottom: 5px;
            }
            
            .score-row {
                gap: 10px;
                margin-bottom: 8px;
            }
            
            .score-box {
                padding: 5px 10px;
            }
            
            .score-value {
                font-size: 14px;
            }
            
            .game-container {
                padding: 5px;
                border-width: 1px;
            }
            
            .btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="score-row">
        <div class="score-box">
            <div class="score-label">得分</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">最高分</div>
            <div class="score-value" id="best">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">长度</div>
            <div class="score-value" id="length">3</div>
        </div>
    </div>
    
    <div class="game-area">
        <div class="game-container">
            <div class="game-board" id="board"></div>
            <div class="game-message" id="message">
                <p id="msg-text">游戏结束!</p>
                <button class="btn btn-accent" onclick="startGame()">再来一局</button>
            </div>
        </div>
    </div>
    
    <div class="btn-row">
        <button class="btn btn-accent" onclick="startGame()">新游戏</button>
        <button class="btn" onclick="togglePause()">暂停</button>
        <button class="btn" onclick="window.location.href='index.html'">返回</button>
    </div>
    
    <div class="instructions">
        方向键/WASD 控制方向 | 空格 暂停
    </div>

    <script>
        const COLS = 20;
        const ROWS = 15;
        let board = [];
        let snake = [];
        let food = null;
        let direction = 'right';
        let nextDir = 'right';
        let score = 0;
        let best = localStorage.getItem('snakeBest') || 0;
        let gameOver = false;
        let paused = false;
        let gameLoop = null;
        let speed = 150;
        
        document.getElementById('best').textContent = best;
        
        function calcSize() {
            const vw = window.innerWidth;
            const vh = window.innerHeight || 600;
            
            if (vw > 600) return 25;
            
            const topH = 70;
            const btnH = 50;
            const availableH = vh - topH - btnH - 20;
            const availableW = vw - 25;
            
            const cellH = Math.floor(availableH / ROWS);
            const cellW = Math.floor(availableW / COLS);
            
            return Math.max(12, Math.min(20, Math.min(cellH, cellW)));
        }
        
        function applySize() {
            const s = calcSize();
            const el = document.getElementById('board');
            el.style.gridTemplateColumns = `repeat(${COLS}, ${s}px)`;
            el.style.gridTemplateRows = `repeat(${ROWS}, ${s}px)`;
        }
        
        function createBoard() {
            const el = document.getElementById('board');
            el.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;
                    el.appendChild(cell);
                }
            }
        }
        
        function startGame() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            snake = [
                {r: Math.floor(ROWS/2), c: 5},
                {r: Math.floor(ROWS/2), c: 4},
                {r: Math.floor(ROWS/2), c: 3}
            ];
            direction = 'right';
            nextDir = 'right';
            score = 0;
            gameOver = false;
            paused = false;
            speed = 150;
            
            updateScore();
            hideMsg();
            applySize();
            createBoard();
            spawnFood();
            render();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
        }
        
        function spawnFood() {
            const empty = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!snake.some(s => s.r === r && s.c === c)) {
                        empty.push({r, c});
                    }
                }
            }
            if (empty.length > 0) {
                food = empty[Math.floor(Math.random() * empty.length)];
            }
        }
        
        function render() {
            // 清空
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    document.getElementById(`c-${r}-${c}`).className = 'cell';
                }
            }
            
            // 蛇
            snake.forEach((s, i) => {
                const cell = document.getElementById(`c-${s.r}-${s.c}`);
                cell.className = i === 0 ? 'cell snake-head' : 'cell snake';
            });
            
            // 食物
            if (food) {
                document.getElementById(`c-${food.r}-${food.c}`).className = 'cell food';
            }
        }
        
        function tick() {
            if (gameOver || paused) return;
            
            direction = nextDir;
            const head = {...snake[0]};
            
            switch (direction) {
                case 'up': head.r--; break;
                case 'down': head.r++; break;
                case 'left': head.c--; break;
                case 'right': head.c++; break;
            }
            
            // 边界检测
            if (head.r < 0 || head.r >= ROWS || head.c < 0 || head.c >= COLS) {
                endGame();
                return;
            }
            
            // 自撞检测
            if (snake.some(s => s.r === head.r && s.c === head.c)) {
                endGame();
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物
            if (food && head.r === food.r && head.c === food.c) {
                score += 10;
                updateScore();
                spawnFood();
                
                // 加速
                if (score % 50 === 0 && speed > 80) {
                    speed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                }
            } else {
                snake.pop();
            }
            
            render();
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            if (score > best) {
                best = score;
                localStorage.setItem('snakeBest', best);
                document.getElementById('best').textContent = best;
            }
            showMsg('游戏结束!');
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }
        
        function showMsg(t) {
            document.getElementById('msg-text').textContent = t;
            document.getElementById('message').classList.add('visible');
        }
        
        function hideMsg() {
            document.getElementById('message').classList.remove('visible');
        }
        
        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            paused ? showMsg('暂停') : hideMsg();
        }
        
        function changeDir(d) {
            const opposites = {up: 'down', down: 'up', left: 'right', right: 'left'};
            if (d !== opposites[direction]) {
                nextDir = d;
            }
        }
        
        // 键盘
        document.addEventListener('keydown', e => {
            const k = e.key;
            if (k === 'ArrowUp' || k === 'w') { e.preventDefault(); changeDir('up'); }
            else if (k === 'ArrowDown' || k === 's') { e.preventDefault(); changeDir('down'); }
            else if (k === 'ArrowLeft' || k === 'a') { e.preventDefault(); changeDir('left'); }
            else if (k === 'ArrowRight' || k === 'd') { e.preventDefault(); changeDir('right'); }
            else if (k === ' ') { e.preventDefault(); togglePause(); }
        });
        
        // 滑动
        let tx = 0, ty = 0;
        document.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
        }, {passive: true});
        
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tx;
            const dy = e.changedTouches[0].clientY - ty;
            const min = 30;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > min) {
                changeDir(dx > 0 ? 'right' : 'left');
            } else if (Math.abs(dy) > min) {
                changeDir(dy > 0 ? 'down' : 'up');
            }
        }, {passive: true});
        
        window.addEventListener('resize', applySize);
        window.addEventListener('orientationchange', () => setTimeout(applySize, 100));
        
        startGame();
    </script>
</body>
</html>
